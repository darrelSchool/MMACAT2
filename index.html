<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Our Wildlife</title>
  </head>
  <body>
    <main class="container">
      <h1>Save Our Wildlife</h1>

      <div class="video-wrapper" id="videoContainer">
        <video
          id="wildlifeVideo"
          controls
          aria-label="Promotional video about wildlife conservation"
        >
          <source src="wildlife.mp4" type="video/mp4" />
          Your browser does not support the video tag. Please download the video
          to watch it.
        </video>
      </div>

      <button id="toggleBtn" class="control-btn" aria-live="polite">
        Play Video
      </button>

      <p>
        Our planet's incredible biodiversity is facing unprecedented threats.
        Watch our short documentary above to discover how our community-led
        conservation initiatives are protecting endangered habitats and securing
        a future where nature thrives.
      </p>
    </main>
  </body>
</html>
